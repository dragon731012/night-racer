<iframe src="game.html"></iframe>
<style>
    body {
        background: black;
    }

    iframe {
        position: absolute;
        left: 0px;
        top: 0px;
        border: 0px;
        margin: 0px;
        transition: 3s all;
        width: 100%;
        height: 100%;
        background: black;
    }
</style>
<script>
    function restart() {
        document.querySelectorAll("iframe")[0].style.opacity = 0;
        setTimeout(() => {
            document.querySelectorAll("iframe")[0].contentWindow.location.reload();
            document.querySelectorAll("iframe")[0].style.opacity = 1;
        }, 3000);
    }
</script>
