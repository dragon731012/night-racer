<script type="module" src="/src/main.js"></script>
<script>
    let lb;
    function leaderboard() {
        lb = document.createElement("iframe");
        lb.style.opacity = 0;
        lb.src = "leaderboard.html";
        document.body.appendChild(lb);
        lb.onload = function() {
            lb.style.opacity = 1;
        };
    }

    function back() {
        if (lb) {
            lb.style.opacity = 0;
            lb.addEventListener("transitionend",() => {
                lb.remove();
            });
        }
    }
</script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Geist+Pixel&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap');

    #score {

        color: white;

        transition: 2s all;
    }

        top: 0px;
        border: 0px;
        margin: 0px;
        z-index: 1001;
        transition: 1.5s all;
        width: 100%;
        height: 100%;
        background: black;
    }

    button {
        opacity: 0;
        font-family: "Geist Pixel", sans-serif;
        font-optical-sizing: auto;
        font-weight: 400;
        cursor: pointer;
        transition: 2s opacity, 0.5s background;
        font-style: normal;
        font-variation-settings: "ELSH" 0;
        margin-top: 20px;
        color: white;
        background: rgba(255, 255, 255, 0);
        border: 1px solid white;
        border-radius: 18px;
        padding: 5px;
        padding-right: 5px;
        padding-left: 5px;
        font-size: 2.2vh;
        padding-left: 10px;
        padding-right: 10px;
    }

    button:hover {
        background: rgba(255, 255, 255, 0.4);
    }

    div {

    #cont {

    #highscore {

        transition: 2s all;
        
    }
</style>
<div id="cont">
    <div id="gameover">
        Game Over.
    </div>
    <div id="othertext">
        Drive safely.
    </div>
    <div id="score">0</div>
    <div id="highscore">0</div>
    <button id="leaderboard" onclick="leaderboard();">Leaderboard</button>
    <button id="restart" onclick="window.parent.restart();">Restart</button>
</div>
